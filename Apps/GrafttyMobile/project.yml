name: GrafttyMobile
options:
  bundleIdPrefix: net.graftty
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

packages:
  GrafttyMobileKit:
    path: ../..

targets:
  GrafttyMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - GrafttyMobile
    settings:
      base:
        INFOPLIST_FILE: GrafttyMobile/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: net.graftty.GrafttyMobile
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
    dependencies:
      - package: GrafttyMobileKit
        product: GrafttyMobileKit

schemes:
  GrafttyMobile:
    build:
      targets:
        GrafttyMobile: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
