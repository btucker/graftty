name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Serialize releases so two tag pushes don't race the tap update step.
# cancel-in-progress: false (unlike CI) — never abort an in-flight
# release; just queue the next one.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # macos-26 mirrors the CI workflow — same Xcode, same Swift, same
    # toolchain quirks already known to work for this repo.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "Tag must start with 'v' — got '$GITHUB_REF_NAME'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        env:
          CONFIGURATION: release
          GRAFTTY_VERSION: ${{ steps.version.outputs.version }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: scripts/bundle.sh

      - name: Verify codesign
        run: codesign --verify --strict --verbose=2 .build/Graftty.app

      - name: Zip artifact
        id: zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ZIP="Graftty-$VERSION.zip"
          # ditto preserves resource forks and extended attributes that
          # codesign cares about; plain `zip` strips them.
          ditto -c -k --keepParent .build/Graftty.app "$ZIP"
          SHA256="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Zip: $ZIP ($SHA256)"

      - name: Fetch Sparkle sign_update
        run: |
          set -euo pipefail
          # Sparkle's SPM manifest is a binary-wrapper for their XCFramework
          # and declares no buildable targets — `swift build --product
          # sign_update` cannot work against it. Fetch the prebuilt tool
          # from Sparkle's release tarball instead. Package.resolved pins
          # the version so the signer matches the embedded framework.
          SPARKLE_VERSION="$(jq -r '.pins[] | select(.identity=="sparkle") | .state.version' Package.resolved)"
          curl -fsSL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle-extract
          tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle-extract
          cp /tmp/sparkle-extract/bin/sign_update ./sign_update
          chmod +x ./sign_update

      - name: Sign release zip
        id: sign
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          ZIP: ${{ steps.zip.outputs.zip }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "SPARKLE_ED_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi
          ED_SIGNATURE="$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | ./sign_update --ed-key-file - "$ZIP")"
          LENGTH="$(stat -f %z "$ZIP")"
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          ZIP: ${{ steps.zip.outputs.zip }}
        run: |
          set -euo pipefail
          # Create the release if it doesn't already exist. Re-runs of a
          # partially-failed workflow (e.g., the tap update step crashed) need
          # to be safe — `gh release create` errors with "release already
          # exists" otherwise. Splitting create from upload lets us use
          # `--clobber` on upload so the zip is always the latest.
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists — re-uploading zip"
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --generate-notes
          fi
          gh release upload "v$VERSION" "$ZIP" --clobber

      - name: Fetch release notes for appcast
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Runs after `Create GitHub release` so the body (produced by
          # `--generate-notes`) is guaranteed to exist.
          NOTES_FILE="$(mktemp)"
          gh release view "v$VERSION" --json body --jq '.body' > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Update appcast on main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ZIP: ${{ steps.zip.outputs.zip }}
          ED_SIGNATURE: ${{ steps.sign.outputs.ed_signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          # Build the appcast-updater tool from the pinned source tree
          # that produced the release.
          swift build -c release --product appcast-updater
          UPDATER="$(swift build -c release --show-bin-path)/appcast-updater"

          # Work in a checkout of main so the push goes straight to the
          # default branch. The release workflow triggers on tag push so
          # HEAD is the tag, not main.
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" main-checkout
          cd main-checkout
          git checkout main

          "$UPDATER" \
            --feed appcast.xml \
            --version "$VERSION" \
            --download-url "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$ZIP" \
            --length "$LENGTH" \
            --ed-signature "$ED_SIGNATURE" \
            --minimum-system-version "14.0" \
            --release-notes "$NOTES_FILE"

          git config user.name  "graftty-release-bot"
          git config user.email "graftty-release-bot@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "Appcast unchanged — idempotent re-run or same-version re-release"
            exit 0
          fi
          git commit -m "appcast: v$VERSION"
          git push origin main

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.zip.outputs.sha256 }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/btucker/homebrew-graftty.git" tap
          cd tap
          # Pull-rebase before editing in case a manual cask edit landed
          # between our clone and our push (e.g., a maintainer syncing
          # caveats from docs/release/Casks/graftty.rb in the source repo).
          # No-op when there's nothing new.
          git pull --rebase origin main
          # Rewrite version + sha256 in place. Two seds (not one) so the
          # failure mode is obvious if either field's literal text drifts
          # in the cask.
          sed -i '' -E "s/^  version \".*\"/  version \"$VERSION\"/" Casks/graftty.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" Casks/graftty.rb
          git config user.name  "graftty-release-bot"
          git config user.email "graftty-release-bot@users.noreply.github.com"
          git add Casks/graftty.rb
          if git diff --cached --quiet; then
            echo "No cask changes — re-releasing the same version?"
            exit 0
          fi
          git commit -m "graftty $VERSION"
          git push
