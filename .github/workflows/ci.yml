name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build app + tests (warnings as errors)
        run: swift build --build-tests -Xswiftc -warnings-as-errors

      - name: Test
        timeout-minutes: 5
        # ZmxSurvivalIntegrationTests skipped: zmx daemon reaping
        # hangs on GH's macOS 14 runner; passes locally. See the
        # comment on that @Suite for the debugging TODO.
        run: swift test --skip-build --skip ZmxSurvivalIntegrationTests
