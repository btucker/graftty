name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml

      - name: Verify web-client bundle is up to date
        run: |
          ./scripts/build-web.sh
          git diff --exit-code Sources/GrafttyKit/Web/Resources/ \
            || { echo "::error::web-client/ changed but the committed bundle is stale. Run ./scripts/build-web.sh locally and recommit."; exit 1; }

  verify-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify SPECS.md is up to date
        run: |
          python3 scripts/generate-specs.py --check \
            || { echo "::error::SPECS.md is stale relative to @spec annotations. Run scripts/generate-specs.py locally and recommit."; exit 1; }

  macos-build-and-test:
    # macos-26 ships Xcode 26 which bundles a current swift-testing.
    # The older swift-testing (124.4) on macos-latest (→ macos-15) has
    # an exit-path hang: all tests pass, then the process blocks ~10 min
    # without emitting the final summary. macos-26 sidesteps it.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build app + tests (warnings as errors)
        run: swift build --build-tests -Xswiftc -warnings-as-errors

      - name: Test
        timeout-minutes: 5
        # `script` gives swift test a PTY-like stdout so output streams
        # in real time instead of being block-buffered by the CI log pipe.
        run: /usr/bin/script -q /dev/null swift test --skip-build

  ios-build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate GrafttyMobile.xcodeproj
        working-directory: Apps/GrafttyMobile
        run: xcodegen generate

      - name: Build & test GrafttyMobile (iOS Simulator SDK)
        timeout-minutes: 15
        # Let xcodebuild apply the default simulator ad-hoc signature
        # (with application-identifier entitlement) — CODE_SIGN_IDENTITY=-
        # in project.yml handles signing. Without a real signature the
        # iOS Keychain rejects every SecItemAdd with errSecMissingEntitlement.
        run: |
          xcodebuild \
            -project Apps/GrafttyMobile/GrafttyMobile.xcodeproj \
            -scheme GrafttyMobile \
            -sdk iphonesimulator \
            -configuration Debug \
            -skipPackagePluginValidation \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test
